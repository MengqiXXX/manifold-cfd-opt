evaluator: remote_openfoam

# 至少 40 个案例：total_budget = n_initial + n_iterations*batch_size = 8 + 8*4 = 40
n_initial: 8
n_iterations: 8
batch_size: 4

# 避免提前收敛停止（确保跑满预算）
convergence_tol: 0.0
convergence_patience: 1000

# 存储
db_path: results_agent_remote_40.sqlite
csv_output: results_agent_remote_40.csv
report_path: optimization_report_agent_remote_40.md

# OpenFOAM（run_agent.py 使用 openfoam_template_dir/openfoam_cases_dir）
openfoam_template_dir: templates/manifold_2d
openfoam_cases_dir: ./.tmp_cases_40
openfoam_cores_per_case: 4
openfoam_max_parallel_cases: 4
foam_source: /opt/openfoam13/etc/bashrc
timeout_s: 1200

# 服务器（remote evaluator 会 SSH 上去跑 OpenFOAM）
ssh_host: 192.168.110.10
ssh_user: liumq
ssh_port: 22
remote_base: ~/manifold_cases


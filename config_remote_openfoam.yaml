evaluator: remote_openfoam

# 优化预算（最小试算）
n_initial: 4
n_iterations: 5
batch_size: 2

# 参数空间
bounds:
  logit_1: [-2.0, 2.0]
  logit_2: [-2.0, 2.0]
  logit_3: [-2.0, 2.0]

# 目录
template_dir: templates/manifold_2d
cases_base: of_cases

# 服务器 & OpenFOAM
ssh_host: 192.168.110.10
ssh_user: liumq
ssh_port: 22
remote_base: ~/manifold_cases
foam_source: /opt/openfoam13/etc/bashrc
n_cores: 8
timeout_s: 900

# LLM（直连 vLLM）
llm_base_url: "http://192.168.110.10:8001/v1"
llm_api_key: "dummy"
llm_model: "qwen2.5-72b"

# 存储
db_path: results_remote.sqlite
csv_output: results_remote.csv
report_path: optimization_report_remote.md

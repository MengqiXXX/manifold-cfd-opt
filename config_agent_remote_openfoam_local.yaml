evaluator: remote_openfoam

# 预算（Agent 会用 total_budget = n_initial + n_iterations*batch_size）
n_initial: 8
n_iterations: 20
batch_size: 4

# 存储（保持 results*.sqlite，便于监控面板自动发现）
db_path: results_agent_remote.sqlite
csv_output: results_agent_remote.csv
report_path: optimization_report_agent_remote.md

# Agent 异常检测（可选）
anomaly_diverge_streak: 3
anomaly_jump_sigma: 3.0
convergence_tol: 0.0005
convergence_patience: 4

# OpenFOAM 模板（run_agent.py 使用 openfoam_template_dir/openfoam_cases_dir）
openfoam_template_dir: templates/manifold_2d
openfoam_cases_dir: ./.tmp_cases
openfoam_cores_per_case: 8
foam_source: /opt/openfoam13/etc/bashrc
timeout_s: 1200

# 服务器（remote evaluator 会 SSH 上去跑 OpenFOAM）
ssh_host: 192.168.110.10
ssh_user: liumq
ssh_port: 22
remote_base: ~/manifold_cases

# Qwen（服务器 vLLM OpenAI compatible）
llm_base_url: "http://192.168.110.10:8001/v1"
llm_api_key: "dummy"
llm_model: "qwen2.5-72b"

